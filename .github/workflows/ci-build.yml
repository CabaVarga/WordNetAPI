name: CI Build

on:
  push:
    branches:
      - master
      - main
      - feature/**
  pull_request:
  workflow_dispatch:

jobs:
  restore-build:
    name: restore-build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            allow_failure: false
          - os: windows-2025
            allow_failure: true
    continue-on-error: ${{ matrix.allow_failure }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.300

      - name: Show .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore src/WordNet.sln

      - name: Install .NET 4.0 reference assemblies
        shell: pwsh
        run: |
          $outDir = Join-Path $env:RUNNER_TEMP 'netfx40-ref'
          nuget install Microsoft.NETFramework.ReferenceAssemblies.net40 `
            -Version 1.0.3 `
            -OutputDirectory $outDir `
            -NonInteractive `
            -ExcludeVersion
          $refPath = Join-Path $outDir `
            'Microsoft.NETFramework.ReferenceAssemblies.net40' `
            'build' '.NETFramework' 'v4.0'
          "CI_NETFX40_PATH=$refPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build
        run: dotnet build src/WordNet.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test src/WordNet.sln --configuration Release --no-build --logger "console;verbosity=normal"
